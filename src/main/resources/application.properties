# =============================================
# APPLICATION
# =============================================
spring.application.name=${APP_NAME:MarketPlace}
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# =============================================
# AI API
# =============================================
asi.api.key=${ASI_API_KEY}

# =============================================
# DATABASE CONFIG
# =============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.hbm2ddl.halt_on_error=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.default_batch_fetch_size=20

spring.flyway.enabled=false

logging.level.org.hibernate.tool.schema.internal.ExceptionHandlerLoggedImpl=ERROR
logging.level.org.hibernate.orm.schema=DEBUG

# =============================================
# JWT CONFIGURATION
# =============================================
jwt.secret=${JWT_SECRET}
jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION:86400000}
jwt.access.admin-expiration-ms=${JWT_ADMIN_EXPIRATION:86400000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION:86400000}

security.token.encryption-key=${TOKEN_ENCRYPTION_KEY}

# =============================================
# HIKARI CONNECTION POOL
# =============================================
spring.datasource.hikari.connection-init-sql=SET search_path TO public
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${HIKARI_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}
spring.datasource.hikari.initialization-fail-timeout=0

logging.level.com.zaxxer.hikari=INFO

# =============================================
# ASYNC THREAD POOL
# =============================================
spring.task.execution.pool.core-size=${ASYNC_CORE:5}
spring.task.execution.pool.max-size=${ASYNC_MAX:10}
spring.task.execution.pool.queue-capacity=${ASYNC_QUEUE:25}
spring.task.execution.thread-name-prefix=marketplace-async-

# =============================================
# WEBSOCKET CONFIG
# =============================================
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# =============================================
# FILE UPLOAD CONFIG
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:50MB}

# =============================================
# DOCKER
# =============================================
spring.docker.compose.enabled=false

# =============================================
# CLOUDINARY
# =============================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# =============================================
# LOGGING CONFIG
# =============================================
logging.level.root=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

logging.level.com.marketPlace.MarketPlace=DEBUG
logging.level.org.springframework.web=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

logging.file.name=logs/marketplace.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# =============================================
# MAIL CONFIG
# =============================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false

# =============================================
# PAYSTACK
# =============================================
paystack.secret.key=${PAYSTACK_SECRET_KEY}
paystack.public.key=${PAYSTACK_PUBLIC_KEY}
paystack.base.url=${PAYSTACK_BASE_URL:https://api.paystack.co}
paystack.callback.url=${PAYSTACK_CALLBACK_URL}

# =============================================
# APP CONFIG
# =============================================
app.frontend.url=${FRONTEND_URL}

# =============================================
# FIREBASE
# =============================================
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH}

# =============================================
# SERVER OPTIMIZATION
# =============================================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html
server.compression.min-response-size=1024

server.error.include-message=always
server.error.include-binding-errors=always